services:
  scanner:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - MAX_CONCURRENT_SCANS=${MAX_CONCURRENT_SCANS:-3}
      - KNOWLEDGE_DIR=/app/guvenlik_proje/knowledge
      - RAG_DB_PATH=/app/guvenlik_proje/rag_db
    volumes:
      - scan_reports:/tmp/scans
      - rag_db:/app/guvenlik_proje/rag_db
      - ./web:/app/web
      - ./guvenlik_proje/knowledge:/app/guvenlik_proje/knowledge:ro
      # Geliştirme kolaylığı: tarayıcı kodu host'tan canlı yansır
      # (modules/, core/, main.py değişikliklerinde rebuild gerekmez,
      #  sadece scanner restart yeterli)
      - ./guvenlik_proje/modules:/app/guvenlik_proje/modules:ro
      - ./guvenlik_proje/core:/app/guvenlik_proje/core:ro
      - ./guvenlik_proje/main.py:/app/guvenlik_proje/main.py:ro
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    networks:
      - internal
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - internal
    restart: unless-stopped
    # GPU desteği için (opsiyonel — NVIDIA Container Toolkit gerekli):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # Ollama hazır olunca .env'deki OLLAMA_PULL_MODELS listesindeki modelleri
  # otomatik indirir, sonra sonlanır. Kullanıcı .env dosyasında modelleri seçer.
  ollama-init:
    image: ollama/ollama
    entrypoint: ["/bin/sh", "-c"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_PULL_MODELS=${OLLAMA_PULL_MODELS:-llama3 nomic-embed-text}
    command:
      - |
        echo "[ollama-init] Ollama bekleniyor...";
        until ollama list >/dev/null 2>&1; do sleep 2; done;
        echo "[ollama-init] Ollama hazır. İndirilecek modeller: $$OLLAMA_PULL_MODELS";
        if ! echo "$$OLLAMA_PULL_MODELS" | grep -q "nomic-embed"; then
          echo "[ollama-init] UYARI: nomic-embed-text listede yok — RAG devre dışı kalabilir.";
        fi;
        for model in $$OLLAMA_PULL_MODELS; do
          # Zaten yüklü mü kontrol et (yeniden indirmesin)
          if ollama list | awk '{print $$1}' | grep -qx "$$model" || \
             ollama list | awk '{print $$1}' | grep -qx "$$model:latest"; then
            echo "[ollama-init] $$model zaten yüklü, atlanıyor.";
          else
            echo "[ollama-init] Pulling $$model...";
            ollama pull "$$model" || echo "[ollama-init] UYARI: $$model indirilemedi.";
          fi;
        done;
        echo "[ollama-init] Tüm modeller hazır.";
    depends_on:
      - ollama
    networks:
      - internal
    restart: "no"

  nginx:
    image: nginx:alpine
    ports:
      - "${WEB_PORT:-9000}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/static:/usr/share/nginx/html:ro
    depends_on:
      - scanner
    networks:
      - internal
    restart: unless-stopped

volumes:
  scan_reports:
  ollama_models:
  rag_db:

networks:
  internal:
    driver: bridge
