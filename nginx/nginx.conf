server {
    listen 80;
    server_name _;

    # WebSocket — uzun taramalar için uzun timeout
    location /ws/ {
        proxy_pass http://scanner:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API
    location /api/ {
        proxy_pass http://scanner:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Sayfa yönlendirmeleri (SPA benzeri)
    location /report/ {
        proxy_pass http://scanner:8000;
        proxy_set_header Host $host;
    }

    # Ana sayfa ve diğer her şey (statik dahil scanner'dan servis edilir)
    location / {
        proxy_pass http://scanner:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
